features: []
shared_features:
  - powermode
  - tdp
  - videomode
custom_features:
  xenia_license:
    prompt: XBOX LIVE ARCADE
    description: This option enables the ability to play Xbox Live Arcade games. May cause compatibility issues with non-XBLA games.
    choices:
      No licenses enabled: 0
      XBLA license enabled (Default): 1
      All possible licenses (Not recommended): -1
  xenia_resolution:
    prompt: INTERNAL DISPLAY RESOLUTION
    description: Allow games that support different resolutions to be rendered in a specific resolution.
    choices:
      640x480: 0
      640x576: 1
      720x480: 2
      720x576: 3
      800x600: 4
      848x480: 5
      1024x768: 6
      1152x864: 7
      1280x720 (Default): 8
      1280x768: 9
      1280x960: 10
      1280x1024: 11
      1360x768: 12
      1440x900: 13
      1680x1050: 14
      1920x540: 15
      1920x1080: 16
      Display Resolution: 17
  xenia_postprocess_scaling_and_sharpening:
    prompt: UPSCALING & SHARPENING
    description: Post-processing filter applied after rendering. CAS adds sharpening only. FSR upscales from a lower resolution for better performance.
    choices:
      Bilinear (Default): bilinear
      CAS - FidelityFX Sharpening: cas
      FSR - FidelityFX Super Resolution: fsr
  xenia_postprocess_antialiasing:
    prompt: ANTI-ALIASING
    description: Post-processing anti-aliasing filter to smooth jagged edges.
    choices:
      None (Default): none
      FXAA: fxaa
      FXAA Extreme: fxaa_extreme
  xenia_postprocess_ffx_cas_additional_sharpness:
    prompt: CAS SHARPNESS
    description: Additional sharpness intensity when using CAS filter. Higher value = more sharpening (0.0 to 1.0).
    choices:
      "0.0 (Default)": 0.0
      "0.1": 0.1
      "0.2": 0.2
      "0.3": 0.3
      "0.4": 0.4
      "0.5": 0.5
      "0.6": 0.6
      "0.7": 0.7
      "0.8": 0.8
      "0.9": 0.9
      "1.0": 1.0
  xenia_postprocess_ffx_fsr_sharpness_reduction:
    prompt: FSR SHARPNESS REDUCTION
    description: Sharpness reduction when using FSR. Lower = sharper, higher = softer (0.0 to 2.0). Default 0.2.
    choices:
      "0.0 (Maximum sharpness)": 0.0
      "0.1": 0.1
      "0.2 (Default)": 0.2
      "0.3": 0.3
      "0.4": 0.4
      "0.5": 0.5
      "0.6": 0.6
      "0.7": 0.7
      "0.8": 0.8
      "0.9": 0.9
      "1.0": 1.0
      "1.5": 1.5
      "2.0 (Minimum sharpness)": 2.0
  xenia_vsync:
    prompt: VSYNC
    description: Fix screen tearing. With some games you need to turn VSync on in the game's options.
    choices:
      Disabled: false
      Enabled (Default): true
  xenia_vsync_fps:
    prompt: VSYNC FPS LIMIT
    description: Manually set a framerate cap. Set to 0 to disable. Should match your monitor refresh rate when VSync is enabled.
    choices:
      No limit (Default): 0
      30fps: 30
      60fps: 60
      120fps: 120
      144fps: 144
      165fps: 165
  xenia_apu:
    prompt: AUDIO BACKEND
    description: Audio backend to use. ALSA is the native Linux audio system; SDL is a cross-platform fallback.
    choices:
      ALSA (Default): alsa
      SDL: sdl
  xenia_headless:
    prompt: UI PROMPTS
    description: Choose to display UI prompts or accept defaults automatically.
    choices:
      Enabled (Default): false
      Disabled: true
  xenia_achievement:
    prompt: SHOW ACHIEVEMENT MESSAGES
    description: Display in-game achievement notifications.
    choices:
      Disabled (Default): false
      Enabled: true
  xenia_country:
