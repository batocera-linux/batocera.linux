  xenia_edge_language:
    prompt: LANGUAGE
    description: Change the game's language.
    choices:
      English (Default): 1
      Japanese: 2
      German: 3
      French: 4
      Spanish: 5
      Italian: 6
      Korean: 7
      Traditional Chinese: 8
      Portuguese: 9
      Polish: 11
      Russian: 12
      Simplified Chinese: 17
  xenia_edge_patches:
    prompt: GAME PATCHES
    description: Enable or disable Xenia game patches. These patches can fix graphics and compatibility problems.
    choices:
      Disabled (Default): false
      Enabled: true
  xenia_edge_license:
    prompt: XBOX LIVE ARCADE
    description: This option enables the ability to play Xbox Live Arcade games. May cause compatibility issues with non-XBLA games.
    choices:
      No licenses enabled: 0
      XBLA license enabled (Default): 1
      All possible licenses (Not recommended): -1
  xenia_edge_cache:
    group: ADVANCED OPTIONS
    prompt: MOUNT CACHE
    description: Enable cache mount. Can improve performance and compatibility in some games.
    choices:
      Enabled (Default): true
      Disabled: false
  xenia_edge_limit_hard:
    group: ADVANCED OPTIONS
    prompt: HARD TEXTURE CACHE MEMORY LIMIT
    description: Maximum host texture memory usage (in megabytes) above which textures will be destroyed as soon as possible.
    choices:
      768MB (Default): 768
      1536MB: 1536
      2304MB: 2034
      3072MB: 3072
      3840MB: 3840
      4096MB: 4096
      5120MB: 5120
      6144MB: 6144
  xenia_edge_limit_soft:
    group: ADVANCED OPTIONS
    prompt: SOFT TEXTURE CACHE MEMORY LIMIT
    description: Maximum host texture memory usage (in megabytes) above which old textures will be destroyed. Set below hard limit.
    choices:
      384MB (Default): 384
      768MB: 768
      1536MB: 1536
      2048MB: 2048
      3072MB: 3072
      4096MB: 4096
  xenia_edge_limit_soft_lifetime:
    group: ADVANCED OPTIONS
    prompt: SOFT TEXTURE CACHE MEMORY TIMEOUT
    description: Seconds a texture should be unused before it is eligible for deletion when above the soft limit.
    choices:
      15s: 15
      30s (Default): 30
      45s: 45
      60s: 60
  xenia_edge_limit_render_to_texture:
    group: ADVANCED OPTIONS
    prompt: RENDER-TO-TEXTURE MEMORY BUDGET
    description: Part of the host texture memory budget (in megabytes) reserved for render-to-texture targets.
    choices:
      24MB (Default): 24
      48MB: 48
      72MB: 72
      96MB: 96
  xenia_edge_occlusion_query:
    group: ADVANCED OPTIONS
    prompt: OCCLUSION QUERY MODE
    description: Controls how visibility effects (lens flares, object culling, auto-exposure) are calculated. Strict is most accurate but can cost performance.
    choices:
      Fake (Safe, lowest cost): fake
      Fast (Default): fast
      Fast-Alt: fast-alt
      Strict (Most accurate): strict
  xenia_edge_precise_interpolation:
    group: ADVANCED OPTIONS
    prompt: PRECISE INTERPOLATION
    description: Manually interpolates pixel shader inputs to exactly match guest hardware. Fixes noise/flicker artifacts in games like Perfect Dark and Tenchu Z. Requires barycentric shader support.
    choices:
      Enabled (Default): true
      Disabled: false
  xenia_edge_disable_context_promotion:
    group: ADVANCED OPTIONS
    prompt: DISABLE CONTEXT PROMOTION
    description: Disables a CPU optimization that some sports games are sensitive to. Enable this only if a specific game has graphical or physics glitches.
    choices:
      Disabled (Default): false
      Enabled: true
systems:
  - xbox360
