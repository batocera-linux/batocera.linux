features: []
shared_features:
  - powermode
  - tdp
  - videomode
  - bezel
  - bezel_stretch
  - hud
  - hud_corner
  - bezel.tattoo
  - bezel.tattoo_corner
  - bezel.tattoo_file
  - bezel.resize_tattoo
custom_features:
  xenia_edge_render_target_path:
    submenu: GRAPHICS
    prompt: RENDER TARGET PATH
    description: Render target emulation method. Accuracy handles more pixel formats correctly but costs more performance, especially with overdraw-heavy games.
    choices:
      Performance (Default): performance
      Accuracy: accuracy
  xenia_edge_widescreen:
    submenu: GRAPHICS
    prompt: WIDESCREEN
    description: Toggle between 16:9 widescreen and original 4:3 aspect ratio.
    choices:
      Enabled (Default): true
      Disabled: false
  xenia_edge_vsync:
    submenu: GRAPHICS
    prompt: VSYNC
    description: Fix screen tearing. Turn off to allow uncapped frame rates or variable refresh rates (VRR).
    choices:
      Enabled (Default): true
      Disabled: false
  xenia_edge_vsync_fps:
    submenu: GRAPHICS
    prompt: VSYNC FPS LIMIT
    description: Manually set a framerate cap. Set to 0 to disable. Should match your monitor refresh rate when VSync is enabled.
    choices:
      No limit (Default): 0
      30fps: 30
      60fps: 60
      120fps: 120
      144fps: 144
      165fps: 165
  xenia_edge_async_shader_compilation:
    submenu: GRAPHICS
    prompt: ASYNC SHADER COMPILATION
    description: Compile shaders in background threads to avoid stutter. Disabling removes async compilation artifacts but reintroduces stutter on first shader use.
    choices:
      Enabled (Default): true
      Disabled: false
  xenia_edge_resolution:
    submenu: GRAPHICS
    prompt: INTERNAL DISPLAY RESOLUTION
    description: Changing this mimics the original Xbox 360 system dashboard resolution. This is not guaranteed to work with all games.
    choices:
      640x480: 0
      640x576: 1
      720x480: 2
      720x576: 3
      800x600: 4
      848x480: 5
      1024x768: 6
      1152x864: 7
      1280x720 (Default): 8
      1280x768: 9
      1280x960: 10
      1280x1024: 11
      1360x768: 12
      1440x900: 13
      1680x1050: 14
      1920x540: 15
      1920x1080: 16
      Display Resolution: 17
  xenia_edge_resolution_scale:
    submenu: GRAPHICS
    prompt: DRAW RESOLUTION MULTIPLIER
    description: Actively upscale 3D graphics rendering resolution. Higher values increase GPU load.
    choices:
      Native (Default): 1
      2x (2K/1440p): 2
      3x (4K/2160p): 3
  xenia_edge_guest_refresh_rate:
    submenu: GRAPHICS
    prompt: EMULATED GUEST REFRESH RATE
    description: Adjust the virtual refresh rate of the emulated Xbox 360 display. Necessary for PAL (50Hz) or NTSC (60Hz) target games.
    choices:
      60Hz (Default): 60hz
      50Hz: 50hz
      Uncapped: uncapped
  xenia_edge_postprocess_antialiasing:
    submenu: GRAPHICS
    prompt: ANTI-ALIASING
    description: Post-processing anti-aliasing filter to smooth jagged edges.
    choices:
      None (Default): none
      FXAA: fxaa
      FXAA Extreme: fxaa_extreme
  xenia_edge_postprocess_scaling_and_sharpening:
    submenu: GRAPHICS
    prompt: UPSCALING & SHARPENING
    description: Post-processing filter applied after rendering. CAS adds sharpening only. FSR upscales from a lower resolution for better performance.
    choices:
      Bilinear (Default): bilinear
      CAS - FidelityFX Sharpening: cas
      FSR - FidelityFX Super Resolution: fsr
  xenia_edge_postprocess_ffx_cas_additional_sharpness:
    submenu: GRAPHICS
    prompt: CAS SHARPNESS
    description: Additional sharpness intensity when using CAS filter. Higher value = more sharpening (0.0 to 1.0).
    choices:
      "0.0 (Default)": 0.0
      "0.1": 0.1
      "0.2": 0.2
      "0.3": 0.3
      "0.4": 0.4
      "0.5": 0.5
      "0.6": 0.6
      "0.7": 0.7
      "0.8": 0.8
      "0.9": 0.9
      "1.0": 1.0
  xenia_edge_postprocess_ffx_fsr_sharpness_reduction:
    submenu: GRAPHICS
    prompt: FSR SHARPNESS REDUCTION
    description: Sharpness reduction when using FSR. Lower = sharper, higher = softer (0.0 to 2.0). Default 0.2.
    choices:
      "0.0 (Maximum sharpness)": 0.0
      "0.1": 0.1
      "0.2 (Default)": 0.2
      "0.3": 0.3
      "0.4": 0.4
      "0.5": 0.5
      "0.6": 0.6
      "0.7": 0.7
      "0.8": 0.8
      "0.9": 0.9
      "1.0": 1.0
      "1.5": 1.5
      "2.0 (Minimum sharpness)": 2.0
  xenia_edge_vibration:
    submenu: CONTROLLERS
    prompt: CONTROLLER VIBRATION
    description: Toggle controller rumble/vibration feedback.
    choices:
      Enabled (Default): true
      Disabled: false
  xenia_edge_deadzone_left:
    submenu: CONTROLLERS
    prompt: LEFT STICK DEADZONE
    description: Percentage of left stick movement ignored near center. Raise this if you experience stick drift.
    choices:
      "0% (Default)": 0.0
      "5%": 0.05
      "10%": 0.1
      "15%": 0.15
      "20%": 0.2
      "25%": 0.25
      "30%": 0.3
  xenia_edge_deadzone_right:
    submenu: CONTROLLERS
    prompt: RIGHT STICK DEADZONE
    description: Percentage of right stick movement ignored near center. Raise this if you experience stick drift.
    choices:
      "0% (Default)": 0.0
      "5%": 0.05
      "10%": 0.1
      "15%": 0.15
      "20%": 0.2
      "25%": 0.25
      "30%": 0.3
  xenia_edge_apu:
    prompt: AUDIO BACKEND
    description: Audio backend to use. ALSA is the native Linux audio system; SDL is a cross-platform fallback.
    choices:
      ALSA (Default): alsa
      SDL: sdl
  xenia_edge_headless:
    prompt: UI PROMPTS
    description: Choose to display UI prompts or accept defaults automatically.
    choices:
      Enabled (Default): false
      Disabled: true
  xenia_edge_achievement:
    prompt: SHOW ACHIEVEMENT MESSAGES
    description: Display in-game achievement notifications.
    choices:
      Disabled (Default): false
      Enabled: true
  xenia_edge_country:
