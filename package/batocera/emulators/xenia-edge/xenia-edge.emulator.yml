  xenia_patches:
    prompt: GAME PATCHES
    description: Enable or disable Xenia game patches. These patches can fix graphics and compatibility problems.
    choices:
      Disabled (Default): false
      Enabled: true
  xenia_cache:
    prompt: MOUNT CACHE
    description: Enable cache mount. Can improve performance and compatibility in some games.
    choices:
      Enabled (Default): true
      Disabled: false
  xenia_limit_hard:
    group: ADVANCED OPTIONS
    prompt: HARD TEXTURE CACHE MEMORY LIMIT
    description: Maximum host texture memory usage (in megabytes) above which textures will be destroyed as soon as possible.
    choices:
      768MB (Default): 768
      1536MB: 1536
      2304MB: 2034
      3072MB: 3072
      3840MB: 3840
      4096MB: 4096
      5120MB: 5120
      6144MB: 6144
  xenia_limit_soft:
    group: ADVANCED OPTIONS
    prompt: SOFT TEXTURE CACHE MEMORY LIMIT
    description: Maximum host texture memory usage (in megabytes) above which old textures will be destroyed. Set below hard limit.
    choices:
      384MB (Default): 384
      768MB: 768
      1536MB: 1536
      2048MB: 2048
      3072MB: 3072
      4096MB: 4096
  xenia_limit_soft_lifetime:
    group: ADVANCED OPTIONS
    prompt: SOFT TEXTURE CACHE MEMORY TIMEOUT
    description: Seconds a texture should be unused before it is eligible for deletion when above the soft limit.
    choices:
      15s: 15
      30s (Default): 30
      45s: 45
      60s: 60
  xenia_limit_render_to_texture:
    group: ADVANCED OPTIONS
    prompt: RENDER-TO-TEXTURE MEMORY BUDGET
    description: Part of the host texture memory budget (in megabytes) reserved for render-to-texture targets.
    choices:
      24MB (Default): 24
      48MB: 48
      72MB: 72
      96MB: 96
