set default="0"
set timeout="15"

load_env -f $prefix/grubenv

if [ "${saved_entry}" = "AYN Odin" ]; then
    set default="0"
    set timeout="3"
    set rotation="270"
elif [ "${saved_entry}" = "AYN Odin v2 screen" ]; then
    set default="1"
    set timeout="3"
    set rotation="90"
else
    set default="0"
    set timeout="15"
    set rotation="270"
fi

set timeout_style=menu
set lang=en_US

loadfont /EFI/BOOT/dejavu-mono.pf2

set gfxmode=auto
insmod efi_gop
insmod gfxterm
terminal_output gfxterm
set menu_color_normal=cyan/blue
set menu_color_highlight=white/blue

function select_model {
    saved_entry="${chosen}"
    save_env -f $prefix/grubenv saved_entry
}

menuentry "AYN Odin" {
    select_model
    linux /boot/Image label=BATOCERA rootwait quiet loglevel=0 console=tty0 console=ttyMSM0,115200n8 clk_ignore_unused pd_ignore_unused
    initrd /boot/initrd.lz4
    devicetree /boot/sdm845-ayn-odin.dtb
}

menuentry "AYN Odin v2 screen" {
    select_model
    linux /boot/Image label=BATOCERA rootwait quiet loglevel=0 console=tty0 console=ttyMSM0,115200n8 clk_ignore_unused pd_ignore_unused
    initrd /boot/initrd.lz4
    devicetree /boot/sdm845-ayn-odin-m2.dtb
}

menuentry "Reboot" {
    reboot
}