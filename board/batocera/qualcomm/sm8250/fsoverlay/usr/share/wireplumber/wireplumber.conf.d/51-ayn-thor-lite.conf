# WirePlumber drop-in for the AYN Thor Lite (SM8250).
#
# Install to:  /etc/wireplumber/wireplumber.conf.d/51-ayn-thor-lite.conf
# (WirePlumber 0.5+; this is SPA-JSON syntax.)
#
# Why this exists:
# The Qualcomm qdsp6 routing path opens its ADM "COPP" with
# NULL_COPP_TOPOLOGY -- a bit-exact passthrough that performs no
# sample-format conversion. The MI2S / CODEC_DMA backends are
# hard-fixed to S16_LE by the kernel's sm8250_be_hw_params_fixup(),
# so the MultiMedia frontend PCMs must also be opened S16LE or the
# speaker / headphone output is noise.
#
# Rate (48000) and channel count (2) are already pinned by the ALSA
# UCM config (Playback/CaptureRate, Playback/CaptureChannels); UCM
# has no equivalent key for the sample format, so it is forced here.
#
# This is scoped to the Thor Lite card only (via alsa.card_name), so
# it replaces any global "force S16LE" override you may have set.
# Confirm the card name matches with:
#     pw-dump | grep -i card_name
# If it differs, adjust the alsa.card_name value below.

monitor.alsa.rules = [
  {
    matches = [
      {
        alsa.card_name = "AYN Thor Lite"
      }
    ]
    actions = {
      update-props = {
        audio.format = "S16LE"
      }
    }
  }
]
