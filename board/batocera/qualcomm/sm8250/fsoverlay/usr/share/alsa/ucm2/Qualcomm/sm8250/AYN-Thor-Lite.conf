Syntax 4

# Use case configuration for AYN Thor Lite (SM8250)
#
# The card driver is "sm8250" so the UCM lookup falls through
# Qualcomm/sm8250/. The card name comes from the `model` property
# in the device tree ("AYN Thor Lite"); a matching symlink in
# conf.d/sm8250/ points back here.
#
# Modeled on the working AYN Odin2 (sm8550) UCM config, which is
# from the same vendor, uses the same wcd938x codec, and is known
# to work. Differences from Odin2: speaker path uses TERTIARY MI2S
# (vs Primary MI2S on Odin2), and PCM device order matches the DTS
# mm1/mm2/mm3 dai-link order.

Comment "AYN Thor Lite"

SectionUseCase."HiFi" {
	File "/Qualcomm/sm8250/AYN-Thor-Lite-HiFi.conf"
	Comment "Speakers, headphones and headset mic"
}

# Set sane initial volumes. Without these, the wcd938x boots with
# the HPH analog volume near minimum and the rx-macro digital
# volumes also low, producing very quiet, intermittent-sounding
# audio on the headphone path. Values copied from AYN Odin2.
BootSequence [
	cset "name='HPHL Volume' 20"
	cset "name='HPHR Volume' 20"
	cset "name='ADC2 Volume' 10"
]

Include.card-init.File "/lib/card-init.conf"
Include.ctl-remap.File "/lib/ctl-remap.conf"
Include.wcd-init.File "/codecs/wcd938x/init.conf"
Include.rxm-init.File "/codecs/qcom-lpass/rx-macro/init.conf"
