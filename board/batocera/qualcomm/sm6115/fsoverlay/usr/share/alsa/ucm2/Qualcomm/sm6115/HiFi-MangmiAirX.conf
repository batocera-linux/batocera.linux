# Use case configuration for Mangmi Air X (SM6115).
# Audio paths:
#   Speaker:     MM1 -> SEC_MI2S_RX        -> AW88261 (playback PCM 0)
#   Headphones:  MM2 -> QUAT_MI2S_RX (SD0) -> ES8326  (playback PCM 1)
#   Mic:         MM4 <- VA_CODEC_DMA_TX_0  <- bolero VA macro DEC0 <- DMIC2
#   Headset Mic: MM5 <- QUAT_MI2S_TX (SD1) <- ES8326 ADC on gpio3


SectionVerb {

	EnableSequence [
		cset "name='SEC_MI2S_RX Audio Mixer MultiMedia1' 1"
		cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia2' 1"
	]

	DisableSequence [
		cset "name='SEC_MI2S_RX Audio Mixer MultiMedia1' 0"
		cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia2' 0"
	]

	Value {
		TQ "HiFi"
	}
}

SectionDevice."Speaker" {
	Comment "Speaker Playback"

	ConflictingDevice [
		"Headphones"
	]

	EnableSequence [
		cset "name='SPK_L PCM Playback Volume' 360"
		cset "name='SPK_R PCM Playback Volume' 360"
	]

	DisableSequence [
		cset "name='SPK_L PCM Playback Volume' 0"
		cset "name='SPK_R PCM Playback Volume' 0"
	]

	Value {
		PlaybackPriority 100
		PlaybackPCM "hw:${CardId},0"
		PlaybackChannels 2
		PlaybackRate 48000
		PlaybackMixer "default:${CardId}"
	}
}

SectionDevice."Headphones" {
	Comment "Headphone Playback (ES8326)"

	ConflictingDevice [
		"Speaker"
	]

	EnableSequence [
		cset "name='Headphones Playback Volume' 120"
	]

	DisableSequence [
		cset "name='Headphones Playback Volume' 0"
	]

	Value {
		PlaybackPriority 200
		PlaybackPCM "hw:${CardId},1"
		PlaybackChannels 2
		PlaybackRate 48000
		PlaybackVolume "Headphones Playback Volume"
		JackControl "Headphone Jack"
		JackHWMute "Speaker"
	}
}

SectionDevice."Mic" {
	Comment "Built-in microphone (DMIC2 via bolero VA macro)"

	EnableSequence [
		cset "name='MultiMedia4 Mixer VA_CODEC_DMA_TX_0' 1"
		cset "name='VA DEC0 MUX' VA_DMIC"
		cset "name='VA DMIC MUX0' DMIC2"
		cset "name='VA_AIF1_CAP Mixer DEC0' 1"
	]

	DisableSequence [
		cset "name='VA_AIF1_CAP Mixer DEC0' 0"
		cset "name='MultiMedia4 Mixer VA_CODEC_DMA_TX_0' 0"
	]

	Value {
		CapturePriority 100
		CapturePCM "hw:${CardId},6"
		CaptureChannels 1
		CaptureRate 48000
	}
}

SectionDevice."Headset Mic" {
	Comment "Headset microphone (ES8326 via QUAT_MI2S_TX)"

	EnableSequence [
		cset "name='MultiMedia5 Mixer QUAT_MI2S_TX' 1"
		cset "name='ALC Capture Switch' 1"
		cset "name='ADC PGA SE Switch' 1"
		cset "name='ADC Capture Volume' 200,200"
	]

	DisableSequence [
		cset "name='MultiMedia5 Mixer QUAT_MI2S_TX' 0"
		cset "name='ALC Capture Switch' 0"
	]

	Value {
		CapturePriority 200
		CapturePCM "hw:${CardId},7"
		CaptureChannels 1
		CaptureRate 48000
		JackControl "Mic Jack"
	}
}
