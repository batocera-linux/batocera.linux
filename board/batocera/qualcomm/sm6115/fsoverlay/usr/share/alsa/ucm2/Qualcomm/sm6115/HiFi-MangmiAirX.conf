# Use case configuration for Mangmi Air X (SM6115).
# Audio path: Q6 AFE -> Secondary MI2S -> ES8326 + AW88261 codecs
# PCM mapping: hw:0,0 = Playback (MM1), hw:0,2 = Mic (MM3)
# Speaker and Headphones share hw:0,0 — routing is mixer-controlled.
# Volume is handled by PipeWire soft-mixer (api.alsa.soft-mixer = true).

SectionVerb {

	EnableSequence [
		cset "name='SEC_MI2S_RX Audio Mixer MultiMedia1' 1"
		cset "name='MultiMedia3 Mixer SEC_MI2S_TX' 1"
		cset "name='HPVol SPKVol Switch' 1"
		cset "name='DAC Playback Volume' 191"
	]

	DisableSequence [
		cset "name='SEC_MI2S_RX Audio Mixer MultiMedia1' 0"
		cset "name='MultiMedia3 Mixer SEC_MI2S_TX' 0"
	]

	Value {
		TQ "HiFi"
	}
}

SectionDevice."Headphones" {
	Comment "Headphones Playback"

	ConflictingDevice [
		"Speaker"
	]

	EnableSequence [
		cset "name='SPK_L PCM Playback Volume' 720"
		cset "name='SPK_R PCM Playback Volume' 720"
	]

	DisableSequence [
		cset "name='HPL Playback Volume' 0"
		cset "name='HPR Playback Volume' 0"
	]

	Value {
		PlaybackPriority 200
		PlaybackPCM "hw:${CardId},0"
		PlaybackChannels 2
		PlaybackRate 48000
		JackControl "Headphone Jack"
		JackHWMute "Speaker"
	}
}

SectionDevice."Speaker" {
	Comment "Speaker Playback"

	ConflictingDevice [
		"Headphones"
	]

	EnableSequence [
		cset "name='HPL Playback Volume' 0"
		cset "name='HPR Playback Volume' 0"
	]

	DisableSequence [
		cset "name='SPK_L PCM Playback Volume' 720"
		cset "name='SPK_R PCM Playback Volume' 720"
	]

	Value {
		PlaybackPriority 100
		PlaybackPCM "hw:${CardId},0"
		PlaybackChannels 2
		PlaybackRate 48000
	}
}

SectionDevice."Mic" {
	Comment "Built-in Microphone Capture"

	EnableSequence [
		cset "name='ADC Capture Volume' 191"
		cset "name='ADC PGA Gain Volume' 4"
	]

	Value {
		CapturePriority 100
		CapturePCM "hw:${CardId},2"
		CaptureChannels 2
		CaptureRate 48000
	}
}
