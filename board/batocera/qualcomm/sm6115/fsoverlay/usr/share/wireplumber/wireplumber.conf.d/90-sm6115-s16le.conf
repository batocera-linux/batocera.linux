monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.*"
      }
    ]
    actions = {
      update-props = {
        audio.format = "S16LE"
        api.alsa.period-size = 1024
        api.alsa.headroom = 512
      }
    }
  }
  {
    matches = [
      {
        node.name = "~alsa_input.*"
      }
    ]
    actions = {
      update-props = {
        audio.format = "S16LE"
        api.alsa.period-size = 1024
        api.alsa.headroom = 512
      }
    }
  }
]
