set default="0"
set timeout="0"

menuentry "Batocera" {
    linux /boot/Image label=BATOCERA rootwait quiet loglevel=0 video=efifb:off console=tty0 console=ttyMSM0,115200n8 vt.global_cursor_default=0
    initrd /boot/initrd.lz4
    devicetree /boot/sm6115-mangmi-air-x-mq65.dtb
}

menuentry "Reboot" {
    reboot
}
